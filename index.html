<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교수님 도장깨기</title>
    <link rel="stylesheet" href="./game.css">
</head>
<body>
    <div id="gameWrapper">

        <!-- 입력 화면 -->
        <div id="inputScreen">
            <!-- <div class="input-title">
                <h1>⚔️ 우당탕탕 교수님 도장깨기</h1>
                <p>격투의 시작</p>
            </div> -->

            <div class="input-main">

                <!-- 왼쪽: 입력 폼 -->
                <div class="input-left">
                    <div class="input-box">
                        <div class="input-group">
                            <label>🎓 플레이어 이름</label>
                            <input type="text" id="playerName" placeholder="학생 이름 입력" maxlength="10">
                        </div>
                        <div class="input-group">
                            <label>👨‍🏫 교수님 성함</label>
                            <input type="text" id="bossName" placeholder="교수님 성함 입력" maxlength="10">
                        </div>
                        <div class="input-group">
                            <label>🏫 학교 이름</label>
                            <select id="schoolName" required>
                                <option value="">📚 학교 선택 (필수)</option>
                                <optgroup label="서울 (27개)">
                                    <option value="고려대학교(서울)">고려대학교(서울)</option>
                                    <option value="광운대학교">광운대학교</option>
                                    <option value="국민대학교">국민대학교</option>
                                    <option value="동국대학교">동국대학교</option>
                                    <option value="동덕여자대학교">동덕여자대학교</option>
                                    <option value="명지대학교(인문)">명지대학교(인문)</option>
                                    <option value="삼육대학교">삼육대학교</option>
                                    <option value="상명대학교(서울)">상명대학교(서울)</option>
                                    <option value="서강대학교">서강대학교</option>
                                    <option value="서경대학교">서경대학교</option>
                                    <option value="서울과학기술대학교">서울과학기술대학교</option>
                                    <option value="서울대학교">서울대학교</option>
                                    <option value="서울여자대학교">서울여자대학교</option>
                                    <option value="서울시립대학교">서울시립대학교</option>
                                    <option value="서울예술대학교">서울예술대학교</option>
                                    <option value="성공회대학교">성공회대학교</option>
                                    <option value="성균관대학교">성균관대학교</option>
                                    <option value="성신여자대학교">성신여자대학교</option>
                                    <option value="서일대학교">서일대학교</option>
                                    <option value="숙명여자대학교">숙명여자대학교</option>
                                    <option value="숭실대학교">숭실대학교</option>
                                    <option value="연세대학교">연세대학교</option>
                                    <option value="이화여자대학교">이화여자대학교</option>
                                    <option value="경희대학교">경희대학교</option>
                                    <option value="한국외국어대학교">한국외국어대학교</option>
                                    <option value="한성대학교">한성대학교</option>
                                    <option value="홍익대학교">홍익대학교</option>
                                </optgroup>
                                <optgroup label="경기/인천 (18개)">
                                    <option value="가톨릭대학교(경기)">가톨릭대학교(경기)</option>
                                    <option value="강남대학교">강남대학교</option>
                                    <option value="가천대학교">가천대학교</option>
                                    <option value="경기대학교">경기대학교</option>
                                    <option value="단국대학교">단국대학교</option>
                                    <option value="명지대학교(자연)">명지대학교(자연)</option>
                                    <option value="수원대학교">수원대학교</option>
                                    <option value="신한대학교">신한대학교</option>
                                    <option value="성결대학교">성결대학교</option>
                                    <option value="한국외국어대학교(글로벌)">한국외국어대학교(글로벌)</option>
                                    <option value="한국항공대학교">한국항공대학교</option>
                                    <option value="인천대학교">인천대학교</option>
                                    <option value="인하대학교">인하대학교</option>
                                    <option value="중부대학교">중부대학교</option>
                                    <option value="인하공업전문대학">인하공업전문대학</option>
                                    <option value="태재대학교">태재대학교</option>
                                    <option value="평택대학교">평택대학교</option>
                                    <option value="한국공학대학교">한국공학대학교</option>
                                </optgroup>
                                <optgroup label="강원 (2개)">
                                    <option value="연세대학교(미래)">연세대학교(미래)</option>
                                    <option value="한림대학교">한림대학교</option>
                                </optgroup>
                                <optgroup label="충청 (17개)">
                                    <option value="고려대학교(세종)">고려대학교(세종)</option>
                                    <option value="공주대학교(천안)">공주대학교(천안)</option>
                                    <option value="백석대학교">백석대학교</option>
                                    <option value="상명대학교(천안)">상명대학교(천안)</option>
                                    <option value="선문대학교">선문대학교</option>
                                    <option value="순천향대학교">순천향대학교</option>
                                    <option value="을지대학교">을지대학교</option>
                                    <option value="우송대학교">우송대학교</option>
                                    <option value="한남대학교">한남대학교</option>
                                    <option value="한밭대학교">한밭대학교</option>
                                    <option value="한서대학교">한서대학교</option>
                                    <option value="한국교통대학교">한국교통대학교</option>
                                    <option value="한국기술교육대학교">한국기술교육대학교</option>
                                    <option value="충남대학교">충남대학교</option>
                                    <option value="충북대학교">충북대학교</option>
                                    <option value="호서대학교">호서대학교</option>
                                    <option value="청주대학교">청주대학교</option>
                                </optgroup>
                                <optgroup label="경상/대구 (10개)">
                                    <option value="계명대학교">계명대학교</option>
                                    <option value="경상국립대학교">경상국립대학교</option>
                                    <option value="경성대학교">경성대학교</option>
                                    <option value="금오공과대학교">금오공과대학교</option>
                                    <option value="대구대학교">대구대학교</option>
                                    <option value="동아대학교">동아대학교</option>
                                    <option value="영남대학교">영남대학교</option>
                                    <option value="한동대학교">한동대학교</option>
                                    <option value="연암공과대학교">연암공과대학교</option>
                                    <option value="국립창원대학교">국립창원대학교</option>
                                </optgroup>
                                <optgroup label="전라/광주 (2개)">
                                    <option value="순천대학교">순천대학교</option>
                                    <option value="전북대학교">전북대학교</option>
                                </optgroup>
                                <optgroup label="제주 (1개)">
                                    <option value="제주대학교">제주대학교</option>
                                </optgroup>
                            </select>
                        </div>
                        <button id="gameStartBtn">⚔️ 게임 시작</button>
                    </div>

                    <div class="input-controls">
                        <h3>🎮 조작법</h3>
                        <div class="controls-grid">
                            <div class="ctrl-item"><kbd>←</kbd><kbd>→</kbd> 이동</div>
                            <div class="ctrl-item"><kbd>↑</kbd> 점프</div>
                            <div class="ctrl-item"><kbd>↓</kbd> 방어/회피</div>
                            <div class="ctrl-item"><kbd>Space</kbd> 기본 공격</div>
                            <div class="ctrl-item"><kbd>Z</kbd> 강공격</div>
                            <div class="ctrl-item"><kbd>X</kbd> 킥</div>
                            <div class="ctrl-item"><kbd>C</kbd> 필살기</div>
                            <div class="ctrl-item"><kbd>↑+Space</kbd> 점프 공격</div>
                        </div>
                    </div>
                </div>

                <!-- 오른쪽: 랭킹 -->
                <div class="input-right">
                    <div class="ranking-inline">
                        <div class="ranking-header">
                            <h2>🏆 명예의 전당</h2>
                            <div class="ranking-filter">
                                <select id="schoolFilter" onchange="loadRanking(this.value)">
                                </select>
                            </div>
                        </div>
                        <div id="rankingTableWrap"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 게임 화면 -->
        <div id="gameScreen" class="hidden">
            <!-- HUD -->
            <div id="hud">
                <div class="hud-player">
                    <span id="p1Name" class="fighter-name">학생</span>
                    <div class="hp-wrap">
                        <div id="p1HpBar" class="hp-bar p1-bar"></div>
                        <div id="p1HpDamage" class="hp-damage"></div>
                    </div>
                    <span id="p1HpText" class="hp-text">200</span>
                </div>
                <div class="hud-center">
                    <div id="roundDisplay">ROUND 1</div>
                    <div id="timerDisplay">99</div>
                    <div id="roundIcons">
                        <div class="round-dots" id="p1Dots"></div>
                        <div class="round-dots" id="p2Dots"></div>
                    </div>
                </div>
                <div class="hud-boss">
                    <span id="p2HpText" class="hp-text">500</span>
                    <div class="hp-wrap">
                        <div id="p2HpBar" class="hp-bar p2-bar"></div>
                        <div id="p2HpDamage" class="hp-damage p2-damage"></div>
                    </div>
                    <span id="p2Name" class="fighter-name">교수</span>
                </div>
                <button id="menuBtn" class="menu-btn">🏠 메뉴</button>
            </div>

            <!-- 필살기 게이지 -->
            <div id="specialGauge">
                <span class="gauge-label">⚡ 필살기</span>
                <div class="gauge-wrap">
                    <div id="specialBar" class="special-bar"></div>
                </div>
                <span id="specialText">0%</span>
            </div>

            <!-- 캔버스 -->
            <canvas id="gameCanvas"></canvas>

            <!-- 라운드 배너 -->
            <div id="roundBanner" class="hidden">
                <div id="roundBannerText"></div>
            </div>

            <!-- KO 배너 -->
            <div id="koBanner" class="hidden">
                <div id="koBannerText"></div>
            </div>
        </div>

        <!-- 클리어 화면 -->
        <div id="clearScreen" class="hidden">
            <div class="clear-content">
                <div class="clear-emoji">📝</div>
                <h1 class="clear-title">시험지를 획득하였습니다!</h1>
                <p id="clearPlayerName" class="clear-sub"></p>
                <p class="clear-sub">모든 라운드를 클리어했습니다!</p>
                <div class="clear-stats" id="clearStats"></div>
                <button id="clearRestartBtn">↺ 처음으로</button>
            </div>
        </div>

        <!-- 게임오버 화면 -->
        <div id="gameOverScreen" class="hidden">
            <div class="gameover-content">
                <h1 class="gameover-title">💀 GAME OVER</h1>
                <p id="gameOverMsg"></p>
                <button id="gameOverRestartBtn">↺ 다시 시작</button>
            </div>
        </div>

    </div>

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore }  from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {

            authDomain       : "fight-with-professor.firebaseapp.com",
            projectId        : "fight-with-professor",
            storageBucket    : "fight-with-professor.firebasestorage.app",
            messagingSenderId: "341966431113",

            measurementId    : "G-M2RE1GJF5V"
        };

        window.firebaseApp = initializeApp(firebaseConfig);
        window.db          = getFirestore(window.firebaseApp);
    </script>
    <script src="./game.js"></script>
    <script type="module" src="./ranking.js"></script>
    <script src="./graphics-upgrade-premium.js"></script>
</body>
</html>
