<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://www.gstatic.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>교수님 도장깨기</title>
    <link rel="stylesheet" href="./game.css">
</head>
<body>
    <div id="gameWrapper">

        <div id="inputScreen">
            <div class="input-main">
                <div class="input-left">
                    <div class="input-box">
                        <div class="input-group">
                            <label>🎓 플레이어 이름</label>
                            <input type="text" id="playerName" placeholder="학생 이름 입력" maxlength="10">
                        </div>
                        <div class="input-group">
                            <label>👨‍🏫 교수님 성함</label>
                            <input type="text" id="bossName" placeholder="교수님 성함 입력" maxlength="10">
                        </div>
                        <div class="input-group">
                            <label>🏫 학교 이름</label>
                            <select id="schoolName" required>
                                <option value="">📚 학교 선택 (필수)</option>
                                <optgroup label="서울 (27개)">
                                    <option value="고려대학교(서울)">고려대학교(서울)</option>
                                    <option value="연세대학교">연세대학교</option>
                                    <option value="성균관대학교">성균관대학교</option>
                                    <option value="동국대학교">동국대학교</option>
                                    </optgroup>
                                </select>
                        </div>
                        <button id="gameStartBtn">⚔️ 게임 시작</button>
                    </div>

                    <div class="input-controls">
                        <h3>🎮 조작법</h3>
                        <div class="controls-grid">
                            <div class="ctrl-item"><kbd>←</kbd><kbd>→</kbd> 이동</div>
                            <div class="ctrl-item"><kbd>↑</kbd> 점프</div>
                            <div class="ctrl-item"><kbd>↓</kbd> 방어/회피</div>
                            <div class="ctrl-item"><kbd>Space</kbd> 공격</div>
                            <div class="ctrl-item"><kbd>Z</kbd> 강공격</div>
                            <div class="ctrl-item"><kbd>C</kbd> 필살기</div>
                        </div>
                    </div>
                </div>

                <div class="input-right">
                    <div class="ranking-inline">
                        <div class="ranking-header">
                            <h2>🏆 명예의 전당</h2>
                            <div class="ranking-filter">
                                <select id="schoolFilter"></select>
                            </div>
                        </div>
                        <div id="rankingTableWrap">
                            <div class="ranking-loading">데이터를 불러오는 중...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="gameScreen" class="hidden">
            <div id="hud">
                <div class="hud-player">
                    <span id="p1Name" class="fighter-name">학생</span>
                    <div class="hp-wrap"><div id="p1HpBar" class="hp-bar p1-bar"></div></div>
                </div>
                <div class="hud-center">
                    <div id="roundDisplay">ROUND 1</div>
                    <div id="timerDisplay">99</div>
                </div>
                <div class="hud-boss">
                    <div class="hp-wrap"><div id="p2HpBar" class="hp-bar p2-bar"></div></div>
                    <span id="p2Name" class="fighter-name">교수</span>
                </div>
            </div>
            <canvas id="gameCanvas"></canvas>
            <div id="roundBanner" class="hidden"><div id="roundBannerText"></div></div>
            <div id="koBanner" class="hidden"><div id="koBannerText"></div></div>
        </div>

        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore }  from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHEvyUmzK7A0B7qbjil547ukGnE8-iwTg",
            authDomain: "fight-with-professor.firebaseapp.com",
            projectId: "fight-with-professor",
            storageBucket: "fight-with-professor.firebasestorage.app",
            messagingSenderId: "341966431113",
            appId: "1:341966431113:web:a7cd10a5f9c5366c51f758"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>

    <script src="./graphics-upgrade.js"></script>
    <script src="./game.js"></script>
    <script type="module" src="./ranking.js"></script>
</body>
</html>
